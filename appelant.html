<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Appelant - AnyTalk</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-container"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <span class="brand-text">AnyTalk</span>
            </a>
            <div class="nav-links">
                <button id="logout-btn" class="nav-link">Déconnexion</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="container">
            <div class="profile-card" id="profile-card"></div>
            <div id="role-change-section" class="profile-edit-card" style="margin-top:1rem;"></div>

            <div class="matches-section" id="matches-section">
                <h2 class="section-title">
                    <span class="search-icon">◇</span>
                    <span id="matches-title">Choisir un écoutant</span>
                </h2>
                <div class="search-bar-wrap" id="search-bar-wrap">
                    <input type="text" id="search-input" class="search-input" placeholder="Rechercher par pseudo (ex. Écoute_F247)...">
                </div>
                <div class="matches-grid" id="matches-grid"></div>
            </div>
        </div>
    </main>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="dashboard.js"></script>
    <script src="particles.js"></script>
</body>
</html>
