<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appel - AnyTalk</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-container"></div>

    <div class="call-container">
        <!-- Header -->
        <div class="call-header">
            <button id="close-btn" class="close-btn">✕</button>
            <div class="call-info">
                <h2 id="call-title">Appel</h2>
                <p id="call-subtitle">Chargement...</p>
            </div>
            <div class="spacer"></div>
        </div>

        <!-- Contenu principal -->
        <div class="call-content">
            <!-- Écran de préparation -->
            <div id="call-prepare" class="call-screen">
                <div class="call-avatar" id="call-avatar">👤</div>
                <h3 id="call-name">Chargement...</h3>
                <p id="call-details">Chargement...</p>
                <div id="call-tags" class="call-tags"></div>
                <button id="start-call-btn" class="btn btn-primary btn-large">
                    📞 Démarrer l'appel
                </button>
            </div>

            <!-- Écran d'appel actif -->
            <div id="call-active" class="call-screen hidden">
                <div class="call-video-container">
                    <div id="whereby-container" class="whereby-container">
                        <!-- Whereby iframe sera injecté ici -->
                        <div class="call-loading">
                            <div class="call-avatar-large" id="call-avatar-large">👤</div>
                            <p>Connexion Whereby...</p>
                            <p class="call-room-id" id="call-room-id"></p>
                        </div>
                    </div>
                </div>
                <button id="end-call-btn" class="btn btn-danger btn-large">
                    📴 Terminer l'appel
                </button>
            </div>
        </div>
    </div>

    <!-- Whereby SDK -->
    <script src="https://cdn.whereby.com/iframe-api-1.0.0.js"></script>
    <!-- Firebase SDK -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="call.js"></script>
    <script src="particles.js"></script>
</body>
</html>
