<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection - AnyTalk</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="dashboard-container" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
        <p class="form-hint">Redirection...</p>
    </div>
    <script type="module">
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import { auth, db } from './firebase-config.js';
        var ADMIN_UID = 'FWrrl4ZGDhRLEjYkIw1H3AFIgtf2';
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            if (user.uid === ADMIN_UID) {
                window.location.replace('admin.html');
                return;
            }
            try {
                var snap = await getDoc(doc(db, 'users', user.uid));
                var data = snap.exists() ? snap.data() : {};
                var role = (data.badge && data.badge.type) ? data.badge.type : data.role;
                window.location.replace(role === 'appelant' ? 'appelant.html' : 'ecoutant.html');
            } catch (e) {
                window.location.replace('appelant.html');
            }
        });
    </script>
</body>
</html>
