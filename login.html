<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AnyTalk</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-container"></div>
    <div id="file-protocol-warning" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); color:#fff; z-index:9999; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; font-family:system-ui,sans-serif;">
        <p style="font-size:1.25rem; margin-bottom:1rem;">⚠️ Ouvre le site via un serveur local.</p>
        <p style="margin-bottom:1rem;">Terminal : <code style="background:#333; padding:.5rem 1rem; border-radius:6px;">npm run serve</code></p>
        <p style="opacity:.9;">Puis <strong>http://localhost:8000</strong></p>
    </div>
    <script>
      (function(){ if (window.location.protocol === 'file:') document.getElementById('file-protocol-warning').style.display = 'flex'; })();
    </script>
    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="back-link">← Retour</a>
            
            <div class="auth-header">
                <h1>Connexion</h1>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="votre@email.com">
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" required placeholder="Votre mot de passe">
                    <p class="form-hint" style="margin-top:0.5rem"><a href="#" id="forgot-password-link">Mot de passe oublié ?</a></p>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
            </form>

            <div id="reset-password-block" class="form-group" style="display:none; margin-top:1rem;">
                <label for="reset-email">Réinitialisation du mot de passe</label>
                <p class="form-hint">Entrez votre email : un lien vous sera envoyé pour réinitialiser votre mot de passe.</p>
                <input type="email" id="reset-email" placeholder="votre@email.com" style="margin-bottom:0.5rem">
                <button type="button" id="send-reset-btn" class="btn btn-secondary">Envoyer le lien</button>
                <p id="reset-success-msg" class="form-hint success-msg" style="display:none; margin-top:0.5rem;"></p>
            </div>

            <p class="auth-footer">
                Pas encore de compte ? <a href="register.html">S'inscrire</a>
            </p>

            <div id="error-message" class="error-message"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="login.js"></script>
    <script src="particles.js"></script>
</body>
</html>
