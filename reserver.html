<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réserver un créneau - AnyTalk</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-container"></div>
    <nav class="navbar">
        <div class="nav-container">
            <a href="appelant.html" class="nav-brand" aria-label="AnyTalk">
                <span class="brand-text">AnyTalk</span>
            </a>
            <div class="nav-links">
                <a href="appelant.html" class="nav-link">← Retour aux écoutants</a>
                <button type="button" id="logout-btn" class="nav-link">Déconnexion</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="container container--narrow">
            <nav class="breadcrumb" aria-label="Fil d'Ariane">
                <a href="appelant.html">Écoutants</a>
                <span aria-hidden="true">›</span>
                <span id="reserver-breadcrumb-current">Réserver un créneau</span>
            </nav>
            <h1 class="page-title">Réserver un créneau</h1>
            <div id="reserver-loading" class="reserver-loading">Chargement des créneaux disponibles…</div>
            <div id="reserver-error" class="error-message" style="display:none;"></div>
            <div id="reserver-content" style="display:none;">
                <div class="reserver-card" id="reserver-card"></div>
                <p class="reserver-label">Choisissez un créneau d’1 heure :</p>
                <div id="reserver-slots" class="slots-grid"></div>
                <p id="reserver-no-slots" class="form-hint" style="display:none;">Aucun créneau libre pour le moment. Cet écoutant peut ajouter des disponibilités dans son planning.</p>
                <div id="reserver-confirm" class="reserver-confirm" style="display:none;"></div>
            </div>
        </div>
    </main>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="reserver.js"></script>
    <script src="particles.js"></script>
</body>
</html>
